[package]
name = "brainjar"
version = "0.1.0"
edition = "2021"
description = "AI agent memory backed by AWS Bedrock Knowledge Bases + S3"
authors = ["Glitch <glitch@farad.dev>"]
license = "MIT"
repository = "https://github.com/farad-labs/brainjar"
readme = "README.md"
keywords = ["ai", "memory", "bedrock", "aws", "mcp"]
categories = ["command-line-utilities"]

[[bin]]
name = "brainjar"
path = "src/main.rs"

[lib]
name = "brainjar"
path = "src/lib.rs"

[dependencies]
aws-config = { version = "1", features = ["behavior-version-latest"] }
aws-sdk-s3 = "1"
aws-sdk-bedrockagent = "1"
aws-sdk-bedrockagentruntime = "1"
aws-smithy-types = "1"

clap = { version = "4", features = ["derive", "env"] }
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
sha2 = "0.10"
walkdir = "2"
indicatif = "0.17"
colored = "2"
glob = "0.3"
anyhow = "1"
nucleo-matcher = "0.3"
chrono = { version = "0.4", features = ["serde"] }
hex = "0.4"
dirs = "5"
dialoguer = "0.11"
rustyline = { version = "14", features = ["derive"] }

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
