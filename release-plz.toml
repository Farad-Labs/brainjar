[workspace]
# Conventional commits: https://www.conventionalcommits.org/
# release-plz will bump version and generate CHANGELOG.md entries
# based on commit types: feat → minor, fix/perf → patch, breaking → major

# Tag format: v{version} (e.g., v0.3.0)
git_tag_name = "v{{ version }}"

# Auto-update the changelog on every release
changelog_update = true

# Path to the changelog file
changelog_path = "CHANGELOG.md"

# Generate changelog using git-cliff conventions
[[package]]
name = "brainjar"

# Optionally open a GitHub release PR automatically:
# release_always = false  # only release when version bumped in Cargo.toml

[changelog]
# Header for the changelog
header = """
# Changelog

All notable changes to brainjar are documented here.
Format follows [Keep a Changelog](https://keepachangelog.com/).
Generated by [release-plz](https://release-plz.ieni.dev/) using conventional commits.

"""

# Commit types to include in the changelog
commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactoring" },
  { message = "^docs", group = "Documentation" },
  { message = "^test", group = "Testing" },
  { message = "^chore", skip = true },
  { message = "^ci", skip = true },
  { message = "^style", skip = true },
]

# Show full commit messages (not just subject)
protect_breaking_commits = true
