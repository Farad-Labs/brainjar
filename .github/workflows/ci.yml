name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [dev]

jobs:
  ci:
    name: ci-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy
        run: cargo clippy -- -D warnings
      - name: Build
        run: cargo build
      - name: Unit + integration tests
        run: cargo test

  # Single status check that branch protection requires
  build-and-test:
    name: build-and-test
    needs: ci
    runs-on: ubuntu-latest
    if: always()
    steps:
      - run: |
          if [ "${{ needs.ci.result }}" != "success" ]; then
            echo "CI failed"
            exit 1
          fi
