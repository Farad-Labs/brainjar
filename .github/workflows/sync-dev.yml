name: Sync main → dev

on:
  push:
    branches: [main]

jobs:
  sync-dev:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SYNC_PAT }}

      - name: Merge main into dev and force push
        run: |
          git config user.name "LukeL99"
          git config user.email "lukel99@users.noreply.github.com"
          git checkout dev
          git merge main --no-edit
          git push --force origin dev
