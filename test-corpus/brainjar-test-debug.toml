[providers.openai]
api_key = "${OPENAI_API_KEY}"

[embeddings]
provider = "openai"
model = "text-embedding-3-large"
dimensions = 1024  # Matryoshka shortening — 67% storage reduction vs 3072

[extraction]
provider = "openai"
model = "gpt-5.4-nano"
enabled = true

# Use a separate DB so Gemini and OpenAI test corpora don't clobber each other
data_dir = "~/.brainjar-openai-large-ci-test"

[knowledge_bases.test-corpus]
watch_paths = ["./"]
auto_sync = true
description = "Golden test corpus for search validation (OpenAI text-embedding-3-large)"
